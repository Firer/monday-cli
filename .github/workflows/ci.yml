name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-flight runs of the same workflow on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: typecheck / lint / test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.node == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  build:
    name: build artifact
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke-test compiled CLI
        run: |
          node dist/cli/index.js --version
          node dist/cli/index.js --help

      # `npm pack` produces the same tarball `npm publish` would
      # upload — extracting and running the bin from there catches
      # `package.json` "files"/"bin" regressions that `dist/`-relative
      # smoke tests miss. Lifted from M7 to M2 per `v0.1-plan.md`
      # §8 decision 4: it costs nothing to run early, and a
      # broken-tarball regression discovered at release is far more
      # painful than one discovered now.
      - name: Pack tarball
        id: pack
        run: |
          tarball=$(npm pack --silent)
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "Built $tarball"

      - name: Smoke-test packed tarball
        run: |
          set -eux
          rm -rf /tmp/monday-cli-pack-test
          mkdir -p /tmp/monday-cli-pack-test
          cd /tmp/monday-cli-pack-test
          tar -xzf "$GITHUB_WORKSPACE/${{ steps.pack.outputs.tarball }}"
          # The tarball extracts into ./package — verify the bin
          # entry resolves and the binary actually runs.
          node package/dist/cli/index.js --version
          node package/dist/cli/index.js --help
          # The published tarball must be self-contained: the bin
          # must work when invoked from a fresh dir with the runtime
          # deps installed. --ignore-scripts skips the `prepare`
          # hook that would re-run `tsc` (devDep, not present here);
          # the tarball already ships dist/.
          cd package
          npm install --omit=dev --ignore-scripts --no-package-lock --silent
          node dist/cli/index.js --version
